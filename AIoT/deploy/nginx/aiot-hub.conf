# AIoT Activity Hub - Nginx reverse proxy (production)
# Usage:
# 1) Copy this file to /etc/nginx/sites-available/aiot-hub.conf
# 2) Update server_name
# 3) symlink to sites-enabled and test: sudo nginx -t
# 4) reload: sudo systemctl reload nginx

upstream aiot_next_upstream {
    # Next.js app served by PM2 on local port 3000
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _; # Replace with your domain or static IP

    # Basic request limits and headers
    client_max_body_size 10m;
    server_tokens off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # General reverse proxy to Next.js
    location / {
        proxy_pass http://aiot_next_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Support keep-alive and upgrade semantics used by modern web apps
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Server-Sent Events endpoint used by MQTT stream API
    location /api/mqtt/stream {
        proxy_pass http://aiot_next_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for reliable SSE streaming
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        chunked_transfer_encoding off;

        # Keep stream connections open longer
        proxy_connect_timeout 10s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;

        add_header Cache-Control "no-cache" always;
        add_header X-Accel-Buffering "no" always;
    }
}
